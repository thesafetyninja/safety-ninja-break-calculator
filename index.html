<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Ninja Break Time Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; }
    .card { transition: all 0.2s; background: #FEFEFE; color: #111827; border: 3px solid #FFD31F !important; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); }
    .form-select-btn { transition: all 0.2s; border: 3px solid #d1d5db; }
    .form-select-btn.active { border: 4px solid #10b981 !important; background-color: #ecfdf5; }
    #displayTime { color: #219c29 !important; }
    .custom-icon { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: #1F2937; width: 95%; max-width: 520px; max-height: 90vh; overflow-y: auto; border-radius: 16px; border: 3px solid #FFD31F; }
  </style>
</head>
<body class="py-6">

<div class="max-w-2xl mx-auto px-4">

  <!-- State Selector -->
  <div class="card rounded-3xl shadow-md p-6 mb-6">
    <label class="block uppercase text-blue-600 text-sm font-bold tracking-widest mb-3">SELECT STATE / JURISDICTION</label>
    <select id="stateSelect" onchange="calculateBreaks()" class="w-full px-6 py-4 text-lg border border-gray-300 rounded-2xl focus:outline-none focus:ring-4 focus:ring-blue-200 bg-white text-gray-900"></select>
    <div id="stateNote" class="mt-4 text-sm text-amber-700 font-medium"></div>
    
    <button onclick="showRulesModal()" class="mt-4 text-xs text-blue-400 hover:text-blue-300 flex items-center gap-1">
      <i class="fas fa-list-ul"></i> View All State & Company Break Rules
    </button>
  </div>

  <!-- Clock In -->
  <div class="card rounded-3xl shadow-md p-6 mb-8">
    <label class="block uppercase text-blue-600 text-sm font-bold tracking-widest mb-3">CLOCK IN TIME</label>
    <div class="flex flex-wrap items-end gap-6">
      <input type="time" id="clockIn" onchange="calculateBreaks()" class="text-3xl font-bold bg-white border border-gray-300 text-gray-900 rounded-2xl px-6 py-4 focus:outline-none focus:ring-4 focus:ring-blue-200 w-full sm:w-auto">
      <div>
        <div class="text-xs text-gray-500 font-semibold">SELECTED TIME</div>
        <div id="displayTime" class="text-4xl font-bold"></div>
        <div id="displayDate" class="text-sm text-gray-400"></div>
      </div>
    </div>
    <button onclick="resetToNow()" class="mt-6 w-full sm:w-auto flex items-center justify-center gap-2 bg-transparent border-2 border-blue-600 text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-2xl font-bold">
      <i class="fas fa-redo"></i> Reset to Now
    </button>
  </div>

  <!-- 10-Minute Breaks -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold mb-4 px-1" style="color:#FFD31F">10-Minute Breaks</h2>
    <div id="tenMinBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- 30-Minute Meal Breaks -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold mb-4 px-1" style="color:#FFD31F">30-Minute Meal Breaks</h2>
    <div id="mealBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- Tips -->
  <div id="tipsSection" class="space-y-6 mb-12"></div>

  <!-- Load Tracker -->
  <div class="card rounded-3xl shadow-md p-6">
    <h2 class="uppercase text-xs font-bold tracking-widest mb-4 text-center" style="color:#FFD31F">GENERATE OPTIONAL LOAD TRACKER FORM</h2>
    
    <div class="grid grid-cols-2 gap-4 mb-6">
      <button onclick="selectForm('T&T')" id="btnTandT" class="form-select-btn flex flex-col items-center py-4 rounded-2xl hover:bg-gray-50">
        <img src="assets/tandt-icon.png" class="custom-icon" alt="T&amp;T">
        <span class="font-bold">T&amp;T</span>
      </button>
      <button onclick="selectForm('Semi')" id="btnSemi" class="form-select-btn flex flex-col items-center py-4 rounded-2xl hover:bg-gray-50">
        <img src="assets/semi-icon.png" class="custom-icon" alt="SEMI">
        <span class="font-bold">SEMI</span>
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div><label class="block text-xs font-bold text-gray-500 mb-1">TRUCK #</label><input id="truckNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">TRAILER #</label><input id="trailerNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">START MILEAGE</label><input id="startMileage" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl"></div>
    </div>

    <button onclick="generateLoadTrackerPDF()" class="w-full flex items-center justify-center gap-3 font-bold py-4 rounded-2xl text-lg mb-3" style="background-color:#FFD31F; color:#111827;">
      <i class="fas fa-print text-2xl"></i> Print Tracker (With Data)
    </button>

    <button onclick="generateBlankPDF()" class="w-full flex items-center justify-center gap-3 font-bold py-4 rounded-2xl text-lg" style="background-color:#6B7280; color:white;">
      <img src="assets/pdf.png" alt="PDF Icon" class="w-6 h-6">
      Print Blank PDF
    </button>
  </div>
</div>

<!-- Rules Modal -->
<div id="rulesModal" class="modal">
  <div class="modal-content p-6">
    <div class="flex justify-between items-center mb-6 sticky top-0 bg-[#1F2937] pb-4 border-b border-gray-600">
      <h2 class="text-lg font-bold">Break Rules by State / Company</h2>
      <button onclick="hideRulesModal()" class="text-3xl text-gray-400 hover:text-white">×</button>
    </div>
    <div id="rulesContent" class="space-y-6"></div>
  </div>
</div>

<script>
// ===================== STATE RULES =====================
const STATE_RULES = {
  "Federal (Interstate)": {
    tenDefs: [{label:"Break #1", after:1, before:479}, {label:"Break #2", after:481, before:719}],
    mealDefs: [{label:"Meal #1", after:211, before:479}],
    note: "FMCSA HOS compliant • 30-min off-duty break required after 8 hours"
  },
  "California": {
    tenDefs: [{label:"Break #1", after:1, before:239}, {label:"Break #2", after:241, before:479}],
    mealDefs: [{label:"Meal #1", after:211, before:359}, {label:"Meal #2", after:631, before:779}],
    note: "True CA Law (Labor Code §512) • First meal by end of 5th hour, second by end of 10th hour"
  },
  "California Alternate 1": {
    tenDefs: [{label:"Break #1", after:1, before:239}, {label:"Break #2", after:241, before:479}, {label:"Break #3", after:481, before:719}, {label:"Break #4", after:721, before:959}],
    mealDefs: [{label:"Meal #1", after:211, before:359}, {label:"Meal #2", after:631, before:779}],
    note: "Company Policy (Stricter) • Meal 1: After 3.5 hrs → before 6th hr • Meal 2: After 10.5 hrs → before 13th hr"
  },
  "Washington": {
    tenDefs: [{label:"Break #1", after:1, before:239}, {label:"Break #2", after:241, before:479}],
    mealDefs: [{label:"Meal #1", after:211, before:359}],
    note: "WA RCW 49.12 • Paid 10-min rest + unpaid 30-min meal"
  },
  "Oregon": {
    tenDefs: [{label:"Break #1", after:1, before:239}, {label:"Break #2", after:241, before:479}],
    mealDefs: [{label:"Meal #1", after:211, before:359}],
    note: "OR ORS 653.261 • 30-min meal break required"
  },
  "Nevada": {
    tenDefs: [{label:"Break #1", after:1, before:239}, {label:"Break #2", after:241, before:479}],
    mealDefs: [{label:"Meal #1", after:211, before:359}],
    note: "NV NRS 608.0197 • 30-min meal if working 8+ hours"
  },
  "Default / Other States": {
    tenDefs: [{label:"Break #1", after:1, before:479}, {label:"Break #2", after:481, before:719}],
    mealDefs: [{label:"Meal #1", after:211, before:479}],
    note: "Follow Federal FMCSA + your company policy"
  }
};

// ===================== TIPS =====================
const SAFETY_TIPS = [
  "Maintain safe following distance: one second per 10 feet of vehicle length plus extra for speed and conditions. Space saves lives. (Smith System)",
  "Drive defensively with SAFR: Scan hazards, Anticipate actions, Follow safely, React properly—stay one step ahead. (Smith System)",
  "Fatigue is as dangerous as impairment. When drowsy, pull over and rest. Arrive alive, not just on time. (FMCSA 49 CFR §392.3)",
  "Eyes on the road, hands on the wheel, mind on driving. One distraction can change everything—pull over to communicate. (NHTSA)",
  "In rain, fog, snow, or wind: slow down, increase distance, stay in control. Better late than never home. (FMCSA)",
  "Liquid loads shift easily. Slow in curves, manage speed—prevent rollover and keep your rig upright. (FMCSA)",
  "When backing, use G.O.A.L.—Get Out And Look every time. Blind spots kill; caution saves. (FMCSA)",
  "Inspect thoroughly before you roll and after you stop. A missed defect can end your day or your life. (FMCSA 49 CFR §396.13)",
  "Complacency creeps in on familiar routes. Stay sharp every mile—routine is the silent killer. (NSC)",
  "Know your Emergency Response Guidebook. In any incident, consult it first to protect yourself and others. (49 CFR §172.602)",
  "Bond and ground properly, verify loads with 3-point match every time. Prevent sparks and incompatible mixes. (NFPA / FMCSA)",
  "Hot conditions? Hydrate often, take breaks, watch for heat illness signs. (OSHA / FMCSA)",
  "Know your fire extinguisher—PASS: Pull, Aim, Squeeze, Sweep. Check it daily. (FMCSA 49 CFR §393.95)",
  "Safety is always priority one. No load is worth risking your life or your family’s peace of mind. (FMCSA)"
];

const PRE_TRIP_TIPS = [
  "Cab steering wheel: Check play is under 2 inches on a 20-inch wheel.",
  "Cab horn: Make sure it works properly.",
  "Cab wipers and washers: Check they work and blades are good.",
  "Cab mirrors: Clean, secure, and adjusted correctly.",
  "Cab gauges: All read normal with no warning lights.",
  "Cab seatbelts and emergency kit: Check seatbelts and fire extinguisher present.",
  "Cab brakes: Parking brake holds and service brakes work with no pulling.",
  "Engine oil, coolant, power steering, belts, hoses, batteries, air system — all good.",
  "Front lights, windshield, bumper, steering tires (4/32 tread), steering parts secure.",
  "Fuel tank, exhaust, frame, tires (2/32 tread), suspension, air brakes, lights intact.",
  "Rear fifth wheel, lights, mud flaps, drive tires & suspension checked.",
  "Tank manhole, valves, emergency shutoff, placards, labels, safety gear, catwalk all good.",
  "Overall vehicle: No leaks or damage underneath. Documents current."
];

// ===================== VARIABLES =====================
let currentClockTime = "", currentDate = "", currentTenBreaks = [], currentMeals = [], lastSafetyIndex = -1, lastPreTripIndex = -1, selectedForm = "Semi";

// ===================== HELPERS =====================
function minutesToHrsMins(mins) {
  const hours = Math.floor(mins / 60);
  const minutes = mins % 60;
  if (hours === 0) return `${minutes} minutes`;
  if (minutes === 0) return `${hours} hours`;
  return `${hours} hours ${minutes} minutes`;
}

function randomTip(arr, lastIdx) {
  let idx; do { idx = Math.floor(Math.random() * arr.length); } while (idx === lastIdx);
  return {tip: arr[idx], idx};
}

function formatTime(date) {
  let h = date.getHours(); let m = date.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function addMinutes(date, mins) {
  return new Date(date.getTime() + mins * 60000);
}

function formatWithDay(base, result) {
  const diff = Math.round((result - base) / 86400000);
  return diff === 1 ? `${formatTime(result)} (next day)` : formatTime(result);
}

function createCard(label, duration, after, before) {
  return `<div class="card rounded-3xl shadow p-6">
    <div class="flex items-center gap-3 mb-4">
      <i class="fas fa-clock text-2xl text-blue-600"></i>
      <div class="font-bold text-lg">${label} <span class="text-black">(${duration})</span></div>
    </div>
    <div class="space-y-3 text-sm">
      <div><span class="font-semibold text-emerald-600">START AFTER:</span> <span class="font-medium">${after}</span></div>
      <div><span class="font-semibold text-amber-600">START BEFORE:</span> <span class="font-medium">${before}</span></div>
    </div>
  </div>`;
}

function populateStates() {
  const select = document.getElementById('stateSelect');
  Object.keys(STATE_RULES).forEach(state => {
    const opt = document.createElement('option');
    opt.value = state;
    opt.textContent = state;
    select.appendChild(opt);
  });
}

function calculateBreaks() {
  const stateKey = document.getElementById('stateSelect').value || "Federal (Interstate)";
  const rules = STATE_RULES[stateKey];
  document.getElementById('stateNote').innerHTML = `<strong>${stateKey}:</strong> ${rules.note}`;

  const timeInput = document.getElementById('clockIn').value;
  if (!timeInput) return;

  const [hours, minutes] = timeInput.split(':').map(Number);
  const base = new Date();
  base.setHours(hours, minutes, 0, 0);

  const ampm = hours >= 12 ? "PM" : "AM";
  const h12 = hours % 12 || 12;
  currentClockTime = `${h12}:${minutes.toString().padStart(2,'0')} ${ampm}`;
  document.getElementById('displayTime').textContent = currentClockTime;

  const today = new Date();
  currentDate = today.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('displayDate').textContent = currentDate;

  currentTenBreaks = [];
  let html10 = '';
  rules.tenDefs.forEach(d => {
    const afterTime = formatWithDay(base, addMinutes(base, d.after));
    const beforeTime = formatWithDay(base, addMinutes(base, d.before));
    currentTenBreaks.push({afterClean: afterTime.replace(' (next day)',''), beforeClean: beforeTime.replace(' (next day)','')});
    html10 += createCard(d.label, "10 MIN", afterTime, beforeTime);
  });
  document.getElementById('tenMinBreaks').innerHTML = html10;

  currentMeals = [];
  let htmlMeal = '';
  rules.mealDefs.forEach(d => {
    const afterTime = formatWithDay(base, addMinutes(base, d.after));
    const beforeTime = formatWithDay(base, addMinutes(base, d.before));
    currentMeals.push({afterClean: afterTime.replace(' (next day)',''), beforeClean: beforeTime.replace(' (next day)','')});
    htmlMeal += createCard(d.label, "30 MIN", afterTime, beforeTime);
  });
  document.getElementById('mealBreaks').innerHTML = htmlMeal;

  const safety = randomTip(SAFETY_TIPS, lastSafetyIndex);
  lastSafetyIndex = safety.idx;
  const pretrip = randomTip(PRE_TRIP_TIPS, lastPreTripIndex);
  lastPreTripIndex = pretrip.idx;

  const tipsHTML = `
    <div onclick="refreshSafetyTip()" class="card rounded-3xl p-6 cursor-pointer">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-shield-alt text-2xl text-emerald-600"></i>
        <h3 class="font-bold text-emerald-700">Safety Tip of the Day <span class="text-xs font-normal text-black">(press to refresh)</span></h3>
      </div>
      <p class="text-gray-800">${safety.tip}</p>
    </div>
    <div onclick="refreshPreTripTip()" class="card rounded-3xl p-6 cursor-pointer">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-clipboard-check text-2xl text-amber-600"></i>
        <h3 class="font-bold text-amber-700">Pre-Trip Tip of the Day <span class="text-xs font-normal text-black">(press to refresh)</span></h3>
      </div>
      <p class="text-gray-800">${pretrip.tip}</p>
    </div>`;
  document.getElementById('tipsSection').innerHTML = tipsHTML;
}

function refreshSafetyTip() {
  const safety = randomTip(SAFETY_TIPS, lastSafetyIndex);
  lastSafetyIndex = safety.idx;
  document.querySelectorAll('#tipsSection p')[0].textContent = safety.tip;
}
function refreshPreTripTip() {
  const pretrip = randomTip(PRE_TRIP_TIPS, lastPreTripIndex);
  lastPreTripIndex = pretrip.idx;
  document.querySelectorAll('#tipsSection p')[1].textContent = pretrip.tip;
}

function resetToNow() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clockIn').value = `${h}:${m}`;
  calculateBreaks();
}

function selectForm(form) {
  document.getElementById('btnSemi').classList.remove('active');
  document.getElementById('btnTandT').classList.remove('active');
  if (form === 'Semi') document.getElementById('btnSemi').classList.add('active');
  else document.getElementById('btnTandT').classList.add('active');
  selectedForm = form;
}

// ===================== FILLED PDF =====================
async function generateLoadTrackerPDF() {
  try {
    const truck = document.getElementById('truckNum').value.trim() || "—";
    const trailer = document.getElementById('trailerNum').value.trim() || "—";
    const mileage = document.getElementById('startMileage').value.trim() || "—";
    const selectedState = document.getElementById('stateSelect').value || "Federal (Interstate)";

    const pdfPath = selectedForm === "Semi" ? "assets/Semi.pdf" : "assets/TandT.pdf";
    const response = await fetch(pdfPath);
    if (!response.ok) throw new Error("Could not load PDF");
    const pdfBytes = new Uint8Array(await response.arrayBuffer());

    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    const page = pdfDoc.getPages()[0];
    const { height } = page.getSize();

    page.drawText(selectedState, { x: 260, y: height - 45, size: 11, font: await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold) });

    page.drawText(currentClockTime || "", { x: 90, y: height - 76, size: 9 });
    page.drawText(currentDate || "", { x: 73, y: height - 86, size: 8 });
    page.drawText(truck, { x: 225, y: height - 87, size: 9 });
    page.drawText(trailer, { x: 265, y: height - 87, size: 9 });
    page.drawText(mileage, { x: 330, y: height - 76, size: 9 });

    currentTenBreaks.forEach((b, i) => {
      if (i === 0) { page.drawText(b.afterClean, { x: 120, y: height - 113, size: 11 }); page.drawText(b.beforeClean, { x: 200, y: height - 113, size: 11 }); }
      if (i === 1) { page.drawText(b.afterClean, { x: 325, y: height - 113, size: 11 }); page.drawText(b.beforeClean, { x: 405, y: height - 113, size: 11 }); }
      if (i === 2) { page.drawText(b.afterClean, { x: 120, y: height - 134, size: 11 }); page.drawText(b.beforeClean, { x: 200, y: height - 134, size: 11 }); }
      if (i === 3) { page.drawText(b.afterClean, { x: 325, y: height - 134, size: 11 }); page.drawText(b.beforeClean, { x: 405, y: height - 134, size: 11 }); }
    });

    currentMeals.forEach((b, i) => {
      if (i === 0) { page.drawText(b.afterClean, { x: 120, y: height - 154, size: 11 }); page.drawText(b.beforeClean, { x: 200, y: height - 154, size: 11 }); }
      if (i === 1) { page.drawText(b.afterClean, { x: 325, y: height - 154, size: 11 }); page.drawText(b.beforeClean, { x: 405, y: height - 154, size: 11 }); }
    });

    const finalPdfBytes = await pdfDoc.save();
    const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Safety_Ninja_${selectedForm}_Load_Tracker.pdf`;
    a.click();
  } catch (e) {
    console.error(e);
    alert("PDF generation failed: " + e.message);
  }
}

// ===================== BLANK PDF =====================
async function generateBlankPDF() {
  try {
    const pdfPath = selectedForm === "Semi" ? "assets/Semi.pdf" : "assets/TandT.pdf";
    const response = await fetch(pdfPath);
    if (!response.ok) throw new Error("Could not load PDF");
    const pdfBytes = new Uint8Array(await response.arrayBuffer());

    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    const finalPdfBytes = await pdfDoc.save();

    const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Safety_Ninja_${selectedForm}_Blank_Form.pdf`;
    a.click();
  } catch (e) {
    console.error(e);
    alert("Blank PDF generation failed: " + e.message);
  }
}

// ===================== RULES MODAL (Clean Display - No Buffer) =====================
function minutesToHrsMins(mins) {
  const hours = Math.floor(mins / 60);
  const minutes = mins % 60;
  if (hours === 0) return `${minutes} minutes`;
  if (minutes === 0) return `${hours} hours`;
  return `${hours} hours ${minutes} minutes`;
}

function showRulesModal() {
  const content = document.getElementById('rulesContent');
  content.innerHTML = '';

  Object.keys(STATE_RULES).forEach(state => {
    const r = STATE_RULES[state];
    let html = `
      <div class="border border-gray-600 rounded-2xl p-5">
        <div class="font-bold text-amber-400 text-lg mb-3">${state}</div>
        <div class="text-sm text-gray-300 mb-4">${r.note}</div>
        
        <div class="space-y-4">
          <div>
            <div class="font-semibold text-emerald-400 mb-2">10-Minute Breaks</div>
    `;

    r.tenDefs.forEach(b => {
      html += `<div class="text-sm bg-gray-800 rounded p-3 mb-2">
        ${b.label}: After <strong>${minutesToHrsMins(b.after)}</strong> → Before <strong>${minutesToHrsMins(b.before)}</strong>
      </div>`;
    });

    html += `</div><div><div class="font-semibold text-amber-400 mb-2">30-Minute Meal Breaks</div>`;

    r.mealDefs.forEach(b => {
      html += `<div class="text-sm bg-gray-800 rounded p-3 mb-2">
        ${b.label}: After <strong>${minutesToHrsMins(b.after)}</strong> → Before <strong>${minutesToHrsMins(b.before)}</strong>
      </div>`;
    });

    html += `</div></div></div>`;
    content.innerHTML += html;
  });

  document.getElementById('rulesModal').style.display = 'flex';
}

function hideRulesModal() {
  document.getElementById('rulesModal').style.display = 'none';
}

// ===================== INITIALIZE =====================
window.onload = () => {
  populateStates();
  document.getElementById('stateSelect').value = "California Alternate 1";
  resetToNow();
};
</script>
</body>
</html>
