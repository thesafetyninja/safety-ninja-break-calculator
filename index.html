<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Ninja Break Time Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; }
    .card { transition: all 0.2s; background: #FEFEFE; color: #111827; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); }
    .form-select-btn.active { border-color: #10b981 !important; background-color: #ecfdf5; }
  </style>
</head>
<body class="py-6">

<div class="max-w-2xl mx-auto px-4">

  <!-- === ORIGINAL BREAK CALCULATOR === -->
  <div class="card rounded-3xl shadow-md p-5 sm:p-6 mb-8 border border-blue-200">
    <label class="block uppercase text-blue-600 text-sm font-bold tracking-widest mb-3">CLOCK IN TIME</label>
    <div class="flex flex-wrap items-end gap-6">
      <input type="time" id="clockIn" onchange="calculateBreaks()" class="text-2xl font-bold bg-white border border-gray-300 text-gray-900 rounded-2xl px-6 py-4 focus:outline-none focus:ring-4 focus:ring-blue-200 w-full sm:w-auto">
      <div>
        <div class="text-xs text-gray-500 font-semibold">SELECTED TIME</div>
        <div id="displayTime" class="text-4xl font-bold text-blue-600"></div>
        <div id="displayDate" class="text-sm text-gray-400 font-medium mt-1"></div>
      </div>
    </div>
    <button onclick="resetToNow()" class="w-full mt-6 flex items-center justify-center gap-2 bg-transparent border-2 border-blue-600 text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-2xl font-bold">
      <i class="fas fa-redo"></i> Reset to Now
    </button>
  </div>

  <!-- 10 Min Breaks -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold text-gray-400 mb-4 px-1">10-Minute Breaks</h2>
    <div id="tenMinBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- 30 Min Meals -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold text-gray-400 mb-4 px-1">30-Minute Meal Breaks</h2>
    <div id="mealBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- Tips -->
  <div id="tipsSection" class="space-y-6"></div>

  <!-- === OPTIONAL LOAD TRACKER PDF (at the bottom) === -->
  <div class="card rounded-3xl shadow-md p-6 mt-12 border border-amber-200">
    <h2 class="uppercase text-xs font-bold text-amber-600 tracking-widest mb-4">Generate Load Tracker PDF (Optional)</h2>
    
    <div class="grid grid-cols-2 gap-4 mb-6">
      <button onclick="selectForm('Semi')" id="btnSemi" class="form-select-btn active flex flex-col items-center py-4 border-2 border-emerald-600 rounded-2xl hover:bg-emerald-50">
        <i class="fas fa-truck text-3xl text-emerald-600 mb-2"></i>
        <span class="font-bold">Semi</span>
      </button>
      <button onclick="selectForm('T&T')" id="btnTandT" class="form-select-btn flex flex-col items-center py-4 border-2 border-gray-300 rounded-2xl hover:bg-gray-50">
        <i class="fas fa-truck-container text-3xl text-amber-600 mb-2"></i>
        <span class="font-bold">T&amp;T</span>
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">TRUCK #</label>
        <input id="truckNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">TRAILER #</label>
        <input id="trailerNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">START MILEAGE</label>
        <input id="startMileage" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200">
      </div>
    </div>

    <button onclick="generateLoadTrackerPDF()" class="w-full flex items-center justify-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl text-lg">
      <i class="fas fa-file-pdf"></i>
      Generate <span id="selectedFormName">Semi</span> PDF
    </button>
  </div>

</div>

<script>
// ============== ORIGINAL BREAK CALCULATOR LOGIC ==============
const SAFETY_TIPS = ["Maintain safe following distance: one second per 10 feet of vehicle length plus extra for speed and conditions. Space saves lives.", /* ... full array as before ... */];
const PRE_TRIP_TIPS = [ /* your full pre-trip tips array as before */ ];

let currentClockTime = "";
let currentDate = "";
let currentTenBreaks = [];
let currentMeals = [];

function randomTip() { return SAFETY_TIPS[Math.floor(Math.random() * SAFETY_TIPS.length)]; }
function randomPreTrip() { return PRE_TRIP_TIPS[Math.floor(Math.random() * PRE_TRIP_TIPS.length)]; }

function formatTime(date) {
  let h = date.getHours(); let m = date.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function addMinutes(date, mins) {
  return new Date(date.getTime() + mins * 60000);
}

function formatWithDay(base, result) {
  const diff = Math.round((result - base) / 86400000);
  const time = formatTime(result);
  return diff === 1 ? `${time} (next day)` : time;
}

function createCard(label, duration, after, before, icon) {
  return `<div class="card rounded-3xl shadow p-6 border border-gray-200">
    <div class="flex items-center gap-3 mb-4">
      <i class="${icon} text-2xl text-blue-600"></i>
      <div class="font-bold text-lg">${label} <span class="text-blue-600">(${duration})</span></div>
    </div>
    <div class="space-y-3 text-sm">
      <div><span class="font-semibold text-emerald-600">START AFTER:</span> <span class="font-medium">${after}</span></div>
      <div><span class="font-semibold text-amber-600">START BEFORE:</span> <span class="font-medium">${before}</span></div>
    </div>
  </div>`;
}

function calculateBreaks() {
  const timeInput = document.getElementById('clockIn').value;
  if (!timeInput) return;
  const [hours, minutes] = timeInput.split(':').map(Number);
  const base = new Date();
  base.setHours(hours, minutes, 0, 0);

  const ampm = hours >= 12 ? "PM" : "AM";
  const h12 = hours % 12 || 12;
  currentClockTime = `${h12}:${minutes.toString().padStart(2,'0')} ${ampm}`;
  document.getElementById('displayTime').textContent = currentClockTime;

  const today = new Date();
  const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  currentDate = today.toLocaleDateString('en-US', dateOptions);
  document.getElementById('displayDate').textContent = currentDate;

  const tenDefs = [{label:"Break #1", after:1, before:239},{label:"Break #2", after:241, before:479},{label:"Break #3", after:481, before:719},{label:"Break #4", after:721, before:959}];
  currentTenBreaks = [];
  let html10 = '';
  tenDefs.forEach(d => {
    const afterTime = formatWithDay(base, addMinutes(base, d.after));
    const beforeTime = formatWithDay(base, addMinutes(base, d.before));
    currentTenBreaks.push({label: d.label, duration: "10 MIN", after: afterTime, before: beforeTime});
    html10 += createCard(d.label, "10 MIN", afterTime, beforeTime, "fas fa-clock");
  });
  document.getElementById('tenMinBreaks').innerHTML = html10;

  const mealDefs = [{label:"Meal #1", after:211, before:359},{label:"Meal #2", after:631, before:779}];
  currentMeals = [];
  let htmlMeal = '';
  mealDefs.forEach(d => {
    const afterTime = formatWithDay(base, addMinutes(base, d.after));
    const beforeTime = formatWithDay(base, addMinutes(base, d.before));
    currentMeals.push({label: d.label, duration: "30 MIN", after: afterTime, before: beforeTime});
    htmlMeal += createCard(d.label, "30 MIN", afterTime, beforeTime, "fas fa-utensils");
  });
  document.getElementById('mealBreaks').innerHTML = htmlMeal;

  const tipsHTML = `
    <div class="card rounded-3xl p-6 border border-emerald-200">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-shield-alt text-2xl text-emerald-600"></i>
        <h3 class="font-bold text-emerald-700">Safety Tip of the Day</h3>
      </div>
      <p class="text-gray-800">${randomTip()}</p>
    </div>
    <div class="card rounded-3xl p-6 border border-amber-200">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-clipboard-check text-2xl text-amber-600"></i>
        <h3 class="font-bold text-amber-700">Pre-Trip Tip of the Day</h3>
      </div>
      <p class="text-gray-800">${randomPreTrip()}</p>
    </div>`;
  document.getElementById('tipsSection').innerHTML = tipsHTML;
}

function resetToNow() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clockIn').value = `${h}:${m}`;
  calculateBreaks();
}

// ============== LOAD TRACKER PDF GENERATOR ==============
let selectedForm = "Semi";

function selectForm(form) {
  selectedForm = form;
  document.getElementById('selectedFormName').textContent = form;
  document.getElementById('btnSemi').classList.toggle('active', form === 'Semi');
  document.getElementById('btnTandT').classList.toggle('active', form === 'T&T');
}

async function generateLoadTrackerPDF() {
  const truck = document.getElementById('truckNum').value.trim() || "—";
  const trailer = document.getElementById('trailerNum').value.trim() || "—";
  const mileage = document.getElementById('startMileage').value.trim() || "—";

  const base64 = selectedForm === "Semi" ? SEMI_PDF_BASE64 : TANDT_PDF_BASE64;
  const pdfBytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  
  const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
  const page = pdfDoc.getPages()[0];
  const { height } = page.getSize();

  page.drawText(currentClockTime, { x: 380, y: height - 95, size: 11 });
  page.drawText(currentDate, { x: 480, y: height - 95, size: 11 });
  page.drawText(truck, { x: 180, y: height - 135, size: 12 });
  page.drawText(trailer, { x: 280, y: height - 135, size: 12 });
  page.drawText(mileage, { x: 420, y: height - 135, size: 12 });

  let y = height - 220;
  currentTenBreaks.forEach(b => {
    page.drawText(`${b.label} ${b.duration}`, { x: 80, y: y, size: 10 });
    page.drawText(b.after, { x: 220, y: y, size: 10 });
    page.drawText(b.before, { x: 320, y: y, size: 10 });
    y -= 18;
  });

  const finalPdfBytes = await pdfDoc.save();
  const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Safety_Ninja_${selectedForm}_Load_Tracker.pdf`;
  a.click();
}

// ============== YOUR TWO BASE64 STRINGS (already inserted) ==============
const SEMI_PDF_BASE64 = "JVBERi0xLjQKJdPr6eEKMSAwIG9iago8PC9UaXRsZSAoTE9BRCBUUkFDS0VSIC0gR29vZ2xlIFNoZWV0cyk...[YOUR FULL SEMI BASE64 STRING IS HERE]..."; 
const TANDT_PDF_BASE64 = "JVBERi0xLjQKJdPr6eEKMSAwIG9iago8PC9UaXRsZSAoTE9BRCBUUkFDS0VSIC0gR29vZ2xlIFNoZWV0cyk...[YOUR FULL T&T BASE64 STRING IS HERE]..."; 

window.onload = () => {
  resetToNow();
  document.getElementById('btnSemi').classList.add('active');
};
</script>
</body>
</html>
