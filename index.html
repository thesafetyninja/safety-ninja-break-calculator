<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Ninja Break Time Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; }
    .card { transition: all 0.2s; background: #FEFEFE; color: #111827; border: 3px solid #FFD31F !important; cursor: pointer; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); }
    .form-select-btn { transition: all 0.2s; }
    .form-select-btn.active { border-color: #10b981 !important; background-color: #ecfdf5; }
    #displayTime { color: #219c29 !important; }
    .custom-icon { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; filter: brightness(0.95); }
  </style>
</head>
<body class="py-6">

<div class="max-w-2xl mx-auto px-4">

  <!-- Clock In -->
  <div class="card rounded-3xl shadow-md p-5 sm:p-6 mb-8">
    <label class="block uppercase text-blue-600 text-sm font-bold tracking-widest mb-3">CLOCK IN TIME</label>
    <div class="flex flex-col sm:flex-row items-center sm:items-end gap-6 w-full">
      <input type="time" id="clockIn" onchange="calculateBreaks()" class="text-2xl font-bold bg-white border border-gray-300 text-gray-900 rounded-2xl px-6 py-4 focus:outline-none focus:ring-4 focus:ring-blue-200 w-full sm:w-auto">
      <div class="text-center sm:text-left w-full sm:w-auto">
        <div class="text-xs text-gray-500 font-semibold">SELECTED TIME</div>
        <div id="displayTime" class="text-4xl font-bold"></div>
        <div id="displayDate" class="text-sm text-gray-400 font-medium mt-1"></div>
      </div>
    </div>
    <button onclick="resetToNow()" class="w-full mt-6 flex items-center justify-center gap-2 bg-transparent border-2 border-blue-600 text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-2xl font-bold">
      <i class="fas fa-redo"></i> Reset to Now
    </button>
  </div>

  <!-- 10-Min Breaks -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold mb-4 px-1" style="color: #FFD31F;">10-Minute Breaks</h2>
    <div id="tenMinBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- 30-Min Meals -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold mb-4 px-1" style="color: #FFD31F;">30-Minute Meal Breaks</h2>
    <div id="mealBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- Tips -->
  <div id="tipsSection" class="space-y-6"></div>

  <!-- Load Tracker Form -->
  <div class="card rounded-3xl shadow-md p-6 mt-12">
    <h2 class="uppercase text-xs font-bold text-amber-600 tracking-widest mb-4">GENERATE OPTIONAL LOAD TRACKER FORM</h2>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <button onclick="selectForm('Semi')" id="btnSemi" class="form-select-btn active flex flex-col items-center py-4 border-2 border-emerald-600 rounded-2xl hover:bg-emerald-50">
        <img src="assets/semi-icon.png" class="custom-icon" alt="Semi">
        <span class="font-bold">Semi</span>
      </button>
      <button onclick="selectForm('T&T')" id="btnTandT" class="form-select-btn flex flex-col items-center py-4 border-2 border-gray-300 rounded-2xl hover:bg-gray-50">
        <img src="assets/tandt-icon.png" class="custom-icon" alt="T&amp;T">
        <span class="font-bold">T&amp;T</span>
      </button>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div><label class="block text-xs font-bold text-gray-500 mb-1">TRUCK #</label><input id="truckNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">TRAILER #</label><input id="trailerNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">START MILEAGE</label><input id="startMileage" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200"></div>
    </div>
    <button onclick="generateLoadTrackerPDF()" class="w-full flex items-center justify-center gap-3 font-bold py-4 rounded-2xl text-lg" style="background-color:#FFD31F; color:#111827;">
      <i class="fas fa-file-pdf"></i> Print Tracker
    </button>
  </div>

</div>

<script>
// ============== FULL SAFETY TIPS ==============
const SAFETY_TIPS = [ /* full list from before */ ];
const PRE_TRIP_TIPS = [ /* full list from before */ ];

// ============== VARIABLES ==============
let currentClockTime = "";
let currentDate = "";
let currentTenBreaks = [];
let currentMeals = [];
let lastSafetyIndex = -1;
let lastPreTripIndex = -1;
let selectedForm = "Semi";

// ============== ALL FUNCTIONS (full) ==============
function randomTip() { /* ... */ }
function randomPreTrip() { /* ... */ }
function formatTime(date) { /* ... */ }
function addMinutes(date, mins) { return new Date(date.getTime() + mins * 60000); }
function formatWithDay(base, result) { /* ... */ }
function createCard(label, duration, after, before) { /* ... */ }
function calculateBreaks() { /* ... full function ... */ }
function refreshSafetyTip() { /* ... */ }
function refreshPreTripTip() { /* ... */ }
function resetToNow() { /* ... */ }
function selectForm(form) { /* ... */ }

// ============== FIXED PDF LOADER (exact filenames) ==============
async function generateLoadTrackerPDF() {
  try {
    const truck = document.getElementById('truckNum').value.trim() || "—";
    const trailer = document.getElementById('trailerNum').value.trim() || "—";
    const mileage = document.getElementById('startMileage').value.trim() || "—";

    const pdfPath = selectedForm === "Semi" ? "assets/Semi.pdf" : "assets/TandT.pdf";

    const response = await fetch(pdfPath);
    if (!response.ok) throw new Error("Could not load PDF");
    const pdfBytes = new Uint8Array(await response.arrayBuffer());

    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    const page = pdfDoc.getPages()[0];
    const { height } = page.getSize();

    // Your coordinates
    page.drawText(currentClockTime, { x: 90, y: height - 76, size: 9 });
    page.drawText(currentDate, { x: 73, y: height - 86, size: 8 });
    page.drawText(truck, { x: 225, y: height - 87, size: 9 });
    page.drawText(trailer, { x: 265, y: height - 87, size: 9 });
    page.drawText(mileage, { x: 330, y: height - 76, size: 9 });

    page.drawText(currentTenBreaks[0].afterClean, { x: 120, y: height - 113, size: 9 });
    page.drawText(currentTenBreaks[0].beforeClean, { x: 200, y: height - 113, size: 9 });
    page.drawText(currentTenBreaks[1].afterClean, { x: 325, y: height - 113, size: 9 });
    page.drawText(currentTenBreaks[1].beforeClean, { x: 405, y: height - 113, size: 9 });
    page.drawText(currentTenBreaks[2].afterClean, { x: 120, y: height - 134, size: 9 });
    page.drawText(currentTenBreaks[2].beforeClean, { x: 200, y: height - 134, size: 9 });
    page.drawText(currentTenBreaks[3].afterClean, { x: 325, y: height - 134, size: 9 });
    page.drawText(currentTenBreaks[3].beforeClean, { x: 405, y: height - 134, size: 9 });

    page.drawText(currentMeals[0].afterClean, { x: 120, y: height - 154, size: 9 });
    page.drawText(currentMeals[0].beforeClean, { x: 200, y: height - 154, size: 9 });
    page.drawText(currentMeals[1].afterClean, { x: 325, y: height - 154, size: 9 });
    page.drawText(currentMeals[1].beforeClean, { x: 405, y: height - 154, size: 9 });

    const finalPdfBytes = await pdfDoc.save();
    const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Safety_Ninja_${selectedForm}_Load_Tracker.pdf`;
    a.click();
  } catch (e) {
    console.error(e);
    alert("PDF generation failed.\n\nError: " + e.message);
  }
}

window.onload = () => {
  resetToNow();
  document.getElementById('btnSemi').classList.add('active');
};
</script>
</body>
</html>
