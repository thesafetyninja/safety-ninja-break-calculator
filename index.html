<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Ninja Break Time Calculator-DEBUG-DEBUG-DEBUG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; }
    .card { transition: all 0.2s; background: #FEFEFE; color: #111827; border: 3px solid #FFD31F !important; cursor: pointer; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); }
    
    .form-select-btn {
      transition: all 0.2s;
      border: 3px solid #d1d5db;
    }
    .form-select-btn.active {
      border: 4px solid #10b981 !important;
      background-color: #ecfdf5;
    }
    
    #displayTime { color: #219c29 !important; }
    .custom-icon { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; filter: brightness(0.95); }
  </style>
</head>
<body class="py-6">

<div class="max-w-2xl mx-auto px-4">

  <!-- Clock In -->
  <div class="card rounded-3xl shadow-md p-5 sm:p-6 mb-8">
    <label class="block uppercase text-blue-600 text-sm font-bold tracking-widest mb-3">CLOCK IN TIME</label>
    <div class="flex flex-col sm:flex-row items-center sm:items-end gap-6 w-full">
      <input type="time" id="clockIn" onchange="calculateBreaks()" class="text-2xl font-bold bg-white border border-gray-300 text-gray-900 rounded-2xl px-6 py-4 focus:outline-none focus:ring-4 focus:ring-blue-200 w-full sm:w-auto">
      <div class="text-center sm:text-left w-full sm:w-auto">
        <div class="text-xs text-gray-500 font-semibold">SELECTED TIME</div>
        <div id="displayTime" class="text-4xl font-bold"></div>
        <div id="displayDate" class="text-sm text-gray-400 font-medium mt-1"></div>
      </div>
    </div>
    <button onclick="resetToNow()" class="w-full mt-6 flex items-center justify-center gap-2 bg-transparent border-2 border-blue-600 text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-2xl font-bold">
      <i class="fas fa-redo"></i> Reset to Now
    </button>
  </div>

  <!-- 10-Min Breaks -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold mb-4 px-1" style="color: #FFD31F;">10-Minute Breaks</h2>
    <div id="tenMinBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- 30-Min Meals -->
  <div class="mb-8">
    <h2 class="uppercase text-xs font-bold mb-4 px-1" style="color: #FFD31F;">30-Minute Meal Breaks</h2>
    <div id="mealBreaks" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <!-- Tips -->
  <div id="tipsSection" class="space-y-6"></div>

  <!-- Load Tracker Form -->
  <div class="card rounded-3xl shadow-md p-6 mt-12">
    <h2 class="uppercase text-xs font-bold text-amber-600 tracking-widest mb-4 text-center sm:text-left">GENERATE OPTIONAL LOAD TRACKER FORM</h2>
    <div class="grid grid-cols-2 gap-4 mb-6">
      <button onclick="selectForm('T&T')" id="btnTandT" class="form-select-btn flex flex-col items-center py-4 rounded-2xl hover:bg-gray-50">
        <img src="assets/tandt-icon.png" class="custom-icon" alt="T&amp;T">
        <span class="font-bold">T&amp;T</span>
      </button>
      <button onclick="selectForm('Semi')" id="btnSemi" class="form-select-btn flex flex-col items-center py-4 rounded-2xl hover:bg-gray-50">
        <img src="assets/semi-icon.png" class="custom-icon" alt="Semi">
        <span class="font-bold">SEMI</span>
      </button>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div><label class="block text-xs font-bold text-gray-500 mb-1">TRUCK #</label><input id="truckNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">TRAILER #</label><input id="trailerNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200"></div>
      <div><label class="block text-xs font-bold text-gray-500 mb-1">START MILEAGE</label><input id="startMileage" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200"></div>
    </div>
    <button onclick="generateLoadTrackerPDF()" class="w-full flex items-center justify-center gap-3 font-bold py-4 rounded-2xl text-lg" style="background-color:#FFD31F; color:#111827;">
      <i class="fas fa-print text-2xl"></i> Print Tracker
    </button>
    <p class="text-center text-sm text-gray-600 mt-4">Leave blank and press print for a generic reusable form.</p>
  </div>

</div>

<script>
// ============== FULL SAFETY TIPS ==============
const SAFETY_TIPS = [
  "Following distance — Maintain one second of following distance for every 10 feet of your vehicle’s length, plus extra space for speed and conditions. Space saves lives. (Smith System)",
  "Defensive driving — Drive defensively using SAFR: Scan for hazards, Anticipate other drivers’ actions, Follow safely, and React properly. (Smith System)",
  "Fatigue — Fatigue is as dangerous as impairment. If you feel drowsy, pull over immediately and rest. (FMCSA 49 CFR §392.3)",
  "Distraction — Keep your eyes on the road, hands on the wheel, and mind focused on driving. Pull over safely before using any communication device. (NHTSA)",
  "Weather — In rain, fog, snow, or strong wind, slow down, increase your following distance, and stay in full control of your vehicle. (FMCSA)",
  "Liquid loads — Liquid loads shift easily. Reduce speed before curves and manage acceleration to prevent rollover. (FMCSA)",
  "Backing — When backing, always use G.O.A.L. — Get Out And Look every time. Blind spots can be deadly. (FMCSA)",
  "Vehicle inspection — Thoroughly inspect your vehicle before every trip and after every stop. A missed defect can end your day or your life. (FMCSA 49 CFR §396.13)",
  "Complacency — Complacency on familiar routes is dangerous. Stay sharp and alert every mile. (NSC)",
  "ERG location — Keep your Emergency Response Guidebook readily available in the cab at all times (driver’s door pocket or center console). It must be immediately accessible while driving — never in the sleeper berth. (49 CFR §172.602)",
  "Shipping papers (BOL) — Keep your Bill of Lading and shipping papers secured in the cab within immediate reach of the driver at all times. Do not store them in the sleeper berth. (49 CFR §177.817)",
  "ERG book — Know your Emergency Response Guidebook. Use the colored pages (yellow for ID numbers, blue for names, orange for guides, green for evacuation) to quickly identify hazards and response actions. (DOT / FMCSA)",
  "Placarding — When carrying multiple products (e.g., 1993, 1203, 1987), correctly placard your truck. With only one holder per side, use the proper combination placard or change as needed. (FMCSA 49 CFR §172)",
  "Bonding & grounding — Bond and ground properly before loading or unloading fuel to prevent switch loading (mixing incompatible products). Verify loads with a 3-point match every time. (FMCSA / NFPA)",
  "Cross-dump prevention — Never deliver the wrong product into a tank. Read lids, trace the hose, point and touch before flowing, and verify out loud. Wrong drops can cost $10k–$100k+. (FMCSA / OPW)",
  "FR clothing & PPE — Always wear fire-retardant (FR) clothing and required PPE when loading or unloading fuel. (FMCSA / NFPA)",
  "Fire & spark awareness — While offloading, do not smoke, use cell phones, or allow open flames. If you smell anything unusual, stop immediately and say something. (FMCSA / NFPA)",
  "Fire extinguisher — Your truck must carry a properly rated ABC fire extinguisher. Check it daily for correct pressure, intact seal, and current expiration date. (FMCSA 49 CFR §393.95)",
  "Personal wellness — Your body is your most important cargo. Lift smart, stay hydrated, eat well, and rest adequately. (NSC)",
  "Stop vigilance — Stay vigilant at stops and deliveries. Report suspicious activity—awareness prevents violence and threats. (FMCSA / CHP)",
  "Professional conduct — Professional and courteous engagement builds trust. Represent the industry safely at every stop. (FMCSA)",
  "Safety priority — Safety is always priority one. No load is worth risking your life or your family’s peace of mind. (FMCSA)",
  "Family mindset — Drive like your family rides with you on every haul. Stay alert, prepared, and committed to zero incidents. (AAA Foundation for Traffic Safety)"
];

const PRE_TRIP_TIPS = [
  "Cab steering wheel — Check the steering wheel play; it should be under 2 inches on a 20-inch wheel. (FMCSA 49 CFR §396.13)",
  "Cab horn — Make sure the cab horn works properly. (FMCSA 49 CFR §396.11)",
  "Cab wipers and washers — Check that the wipers and washers work and that the blades are in good condition. (FMCSA 49 CFR §396.11)",
  "Cab mirrors — Make sure the cab mirrors are clean, secure, and adjusted correctly. (FMCSA 49 CFR §396.11)",
  "Cab gauges — Verify that all cab gauges read normal and there are no warning lights. (FMCSA 49 CFR §396.13)",
  "Cab seatbelts and emergency kit — Check the seatbelts and confirm the fire extinguisher is present and accessible. (FMCSA 49 CFR §396.11)",
  "Cab brakes — Ensure the parking brake holds and the service brakes work without pulling. (FMCSA 49 CFR §396.11)",
  "Cab controls — Confirm the clutch and accelerator work smoothly. (FMCSA 49 CFR §396.13)",
  "Engine oil — Check that the engine oil level is good and there are no leaks. (FMCSA 49 CFR §396.13)",
  "Engine coolant — Verify the engine coolant level is correct and all hoses have no leaks. (FMCSA 49 CFR §396.13)",
  "Engine power steering — Confirm the power steering fluid level is correct and the hoses are secure. (FMCSA 49 CFR §396.13)",
  "Engine belts — Make sure the engine belts are not cracked or loose and have proper tension. (FMCSA 49 CFR §396.13)",
  "Engine hoses — Check that all engine hoses are secure with no cracks, bulges, or leaks. (FMCSA 49 CFR §396.13)",
  "Engine batteries — Ensure the engine batteries are secure and have clean terminals. (FMCSA 49 CFR §396.13)",
  "Engine air system — Verify the air compressor and lines are secure with no leaks. (FMCSA 49 CFR §396.13)",
  "Front lights — Check that the headlights, signals, markers, and reflectors are clean and working. (FMCSA 49 CFR §396.11)",
  "Front windshield — Inspect the windshield glass for any cracks. (FMCSA 49 CFR §396.11)",
  "Front bumper and grille — Confirm the front bumper and grille are secure and undamaged. (FMCSA 49 CFR §396.13)",
  "Front steering tires — Verify the front steering tires are properly inflated, have at least 4/32 inch of tread, and show no cuts. (FMCSA 49 CFR §396.11)",
  "Front steering parts — Check that the front steering components are secure with minimal play. (FMCSA 49 CFR §396.13)",
  "Driver fuel tank — Ensure the driver-side fuel tank is secure, has no leaks, and the cap and gasket are tight. (FMCSA 49 CFR §396.13)",
  "Driver exhaust — Confirm the driver-side exhaust is secure, has good clearance, and shows no leaks. (FMCSA 49 CFR §396.13)",
  "Driver frame — Inspect the driver-side frame rails for any cracks. (FMCSA 49 CFR §396.13)",
  "Driver tires — Check that the driver-side tires have a minimum of 2/32 inch tread and all lug nuts are tight. (FMCSA 49 CFR §396.11)",
  "Driver suspension — Verify the driver-side suspension springs and air bags have no damage and maintain even height. (FMCSA 49 CFR §396.13)",
  "Driver air brakes — Ensure the driver-side air brake lines and chambers are secure with no leaks. (FMCSA 49 CFR §396.11)",
  "Driver side lights — Confirm the driver-side marker lights, reflectors, and reflective tape are intact. (FMCSA 49 CFR §396.11)",
  "Rear fifth wheel — Check that the rear fifth wheel kingpin is secure, lubricated, and properly locked. (FMCSA 49 CFR §396.11)",
  "Rear lights — Verify the taillights and brake signals are working. (FMCSA 49 CFR §396.11)",
  "Rear mud flaps — Ensure the rear mud flaps are secure and not torn. (FMCSA 49 CFR §396.13)",
  "Rear drive tires and suspension — Inspect the rear drive tires and suspension (same checks as the driver side). (FMCSA 49 CFR §396.11)",
  "Passenger side — Confirm the passenger-side mirrors, fuel tank, exhaust, and frame are intact. (FMCSA 49 CFR §396.13)",
  "Undercarriage — Check the undercarriage driveline, u-joints, and differential for security and no leaks. (FMCSA 49 CFR §396.13)",
  "Undercarriage brakes — Inspect the undercarriage brake drums and rotors for cracks, grease, or wear. (FMCSA 49 CFR §396.11)",
  "Undercarriage air brakes — Verify the undercarriage air brakes build pressure correctly with no leaks and proper pushrod travel. (FMCSA 49 CFR §396.11)",
  "Tank manhole and valves — Ensure the tank manhole vents, fittings, and gaskets are secure with no leaks. (FMCSA 49 CFR §396.13)",
  "Tank emergency shutoff — Confirm the tank emergency shutoff switch works properly. (FMCSA 49 CFR §396.13)",
  "Tank placards — Check that the tank placards are correct for the current load. (FMCSA 49 CFR §396.13)",
  "Tank labels — Verify the tank spec plate and retest dates are current and easy to read. (FMCSA 49 CFR §396.13)",
  "Tank safety gear — Make sure grounding, bonding, the spill kit, and all required PPE are available. (FMCSA 49 CFR §396.13)",
  "Tank catwalk and fenders — Inspect the tank catwalk and fenders to ensure they are clear, safe, and undamaged. (FMCSA 49 CFR §396.13)",
  "Overall vehicle — Perform a final check under the vehicle for any fluid leaks, loose parts, or damage. (FMCSA 49 CFR §396.13)",
  "Cab documents — Confirm the shipping papers and hazmat documents are current and easily accessible. (FMCSA 49 CFR §396.13)",
  "Trailer brakes and lights — Verify the trailer brakes and lights are properly connected and tested — all must be working. (FMCSA 49 CFR §396.11)"
];

let currentClockTime = "";
let currentDate = "";
let currentTenBreaks = [];
let currentMeals = [];
let lastSafetyIndex = -1;
let lastPreTripIndex = -1;
let selectedForm = "Semi";

function randomTip() {
  let index; do { index = Math.floor(Math.random() * SAFETY_TIPS.length); } while (index === lastSafetyIndex);
  lastSafetyIndex = index; return SAFETY_TIPS[index];
}
function randomPreTrip() {
  let index; do { index = Math.floor(Math.random() * PRE_TRIP_TIPS.length); } while (index === lastPreTripIndex);
  lastPreTripIndex = index; return PRE_TRIP_TIPS[index];
}

function formatTime(date) {
  let h = date.getHours(); let m = date.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
}
function addMinutes(date, mins) { return new Date(date.getTime() + mins * 60000); }
function formatWithDay(base, result) {
  const diff = Math.round((result - base) / 86400000);
  const time = formatTime(result);
  return diff === 1 ? `${time} (next day)` : time;
}
function createCard(label, duration, after, before) {
  return `<div class="card rounded-3xl shadow p-6">
    <div class="flex items-center gap-3 mb-4">
      <i class="fas fa-clock text-2xl text-blue-600"></i>
      <div class="font-bold text-lg">${label} <span class="text-black">(${duration})</span></div>
    </div>
    <div class="space-y-3 text-sm">
      <div><span class="font-semibold text-emerald-600">START AFTER:</span> <span class="font-medium">${after}</span></div>
      <div><span class="font-semibold text-amber-600">START BEFORE:</span> <span class="font-medium">${before}</span></div>
    </div>
  </div>`;
}

function calculateBreaks() {
  const timeInput = document.getElementById('clockIn').value;
  if (!timeInput) return;
  const [hours, minutes] = timeInput.split(':').map(Number);
  const base = new Date();
  base.setHours(hours, minutes, 0, 0);

  const ampm = hours >= 12 ? "PM" : "AM";
  const h12 = hours % 12 || 12;
  currentClockTime = `${h12}:${minutes.toString().padStart(2,'0')} ${ampm}`;
  document.getElementById('displayTime').textContent = currentClockTime;

  const today = new Date();
  const dateOptions = { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' };
  currentDate = today.toLocaleDateString('en-US', dateOptions);
  document.getElementById('displayDate').textContent = currentDate;

  const tenDefs = [{label:"Break #1", after:1, before:239},{label:"Break #2", after:241, before:479},{label:"Break #3", after:481, before:719},{label:"Break #4", after:721, before:959}];
  currentTenBreaks = [];
  let html10 = '';
  tenDefs.forEach(d => {
    const afterTime = formatWithDay(base, addMinutes(base, d.after));
    const beforeTime = formatWithDay(base, addMinutes(base, d.before));
    currentTenBreaks.push({afterClean:afterTime.replace(' (next day)',''), beforeClean:beforeTime.replace(' (next day)','')});
    html10 += createCard(d.label, "10 MIN", afterTime, beforeTime);
  });
  document.getElementById('tenMinBreaks').innerHTML = html10;

  const mealDefs = [{label:"Meal #1", after:211, before:359},{label:"Meal #2", after:631, before:779}];
  currentMeals = [];
  let htmlMeal = '';
  mealDefs.forEach(d => {
    const afterTime = formatWithDay(base, addMinutes(base, d.after));
    const beforeTime = formatWithDay(base, addMinutes(base, d.before));
    currentMeals.push({afterClean:afterTime.replace(' (next day)',''), beforeClean:beforeTime.replace(' (next day)','')});
    htmlMeal += createCard(d.label, "30 MIN", afterTime, beforeTime);
  });
  document.getElementById('mealBreaks').innerHTML = htmlMeal;

  const tipsHTML = `
    <div onclick="refreshSafetyTip()" class="card rounded-3xl p-6">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-shield-alt text-2xl text-emerald-600"></i>
        <h3 class="font-bold text-emerald-700">Safety Tip of the Day <span class="text-xs font-normal text-black block sm:inline">(press to refresh)</span></h3>
      </div>
      <p id="safetyTipText" class="text-gray-800">${randomTip()}</p>
    </div>
    <div onclick="refreshPreTripTip()" class="card rounded-3xl p-6">
      <div class="flex items-center gap-3 mb-3">
        <i class="fas fa-clipboard-check text-2xl text-amber-600"></i>
        <h3 class="font-bold text-amber-700">Pre-Trip Tip of the Day <span class="text-xs font-normal text-black block sm:inline">(press to refresh)</span></h3>
      </div>
      <p id="preTripTipText" class="text-gray-800">${randomPreTrip()}</p>
    </div>`;
  document.getElementById('tipsSection').innerHTML = tipsHTML;
}

function refreshSafetyTip() { document.getElementById('safetyTipText').textContent = randomTip(); }
function refreshPreTripTip() { document.getElementById('preTripTipText').textContent = randomPreTrip(); }

function resetToNow() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clockIn').value = `${h}:${m}`;
  calculateBreaks();
}

function selectForm(form) {
  document.getElementById('btnSemi').classList.remove('active');
  document.getElementById('btnTandT').classList.remove('active');
  if (form === 'Semi') document.getElementById('btnSemi').classList.add('active');
  else document.getElementById('btnTandT').classList.add('active');
  selectedForm = form;
}

async function generateLoadTrackerPDF() {
  try {
    const truck = document.getElementById('truckNum').value.trim() || "—";
    const trailer = document.getElementById('trailerNum').value.trim() || "—";
    const mileage = document.getElementById('startMileage').value.trim() || "—";

    const pdfPath = selectedForm === "Semi" ? "assets/Semi.pdf" : "assets/TandT.pdf";

    const response = await fetch(pdfPath);
    if (!response.ok) throw new Error("Could not load PDF");
    const pdfBytes = new Uint8Array(await response.arrayBuffer());

    const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
    const page = pdfDoc.getPages()[0];
    const { height } = page.getSize();

    page.drawText(currentClockTime, { x: 90, y: height - 76, size: 9 });
    page.drawText(currentDate, { x: 73, y: height - 86, size: 8 });
    page.drawText(truck, { x: 225, y: height - 87, size: 9 });
    page.drawText(trailer, { x: 265, y: height - 87, size: 9 });
    page.drawText(mileage, { x: 330, y: height - 76, size: 9 });

    // Break and meal times now size 11 (increased by 2) and appear bolder
    page.drawText(currentTenBreaks[0].afterClean, { x: 120, y: height - 113, size: 11 });
    page.drawText(currentTenBreaks[0].beforeClean, { x: 200, y: height - 113, size: 11 });
    page.drawText(currentTenBreaks[1].afterClean, { x: 325, y: height - 113, size: 11 });
    page.drawText(currentTenBreaks[1].beforeClean, { x: 405, y: height - 113, size: 11 });
    page.drawText(currentTenBreaks[2].afterClean, { x: 120, y: height - 134, size: 11 });
    page.drawText(currentTenBreaks[2].beforeClean, { x: 200, y: height - 134, size: 11 });
    page.drawText(currentTenBreaks[3].afterClean, { x: 325, y: height - 134, size: 11 });
    page.drawText(currentTenBreaks[3].beforeClean, { x: 405, y: height - 134, size: 11 });

    page.drawText(currentMeals[0].afterClean, { x: 120, y: height - 154, size: 11 });
    page.drawText(currentMeals[0].beforeClean, { x: 200, y: height - 154, size: 11 });
    page.drawText(currentMeals[1].afterClean, { x: 325, y: height - 154, size: 11 });
    page.drawText(currentMeals[1].beforeClean, { x: 405, y: height - 154, size: 11 });

    const finalPdfBytes = await pdfDoc.save();
    const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Safety_Ninja_${selectedForm}_Load_Tracker.pdf`;
    a.click();
  } catch (e) {
    console.error(e);
    alert("PDF generation failed.\n\nError: " + e.message);
  }
}

window.onload = () => {
  resetToNow();
  document.getElementById('btnTandT').classList.add('active');
};
</script>
</body>
</html>
