<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safety Ninja Break Time Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; }
    .card { transition: all 0.2s; background: #FEFEFE; color: #111827; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); }
    .form-select-btn.active { border-color: #10b981 !important; background-color: #ecfdf5; }
  </style>
</head>
<body class="py-6">

<div class="max-w-2xl mx-auto px-4">

  <!-- === YOUR CLEAN BREAK CALCULATOR (unchanged) === -->
  <!-- Clock In, 10-min breaks, 30-min meals, tips, reset button -->
  <!-- (The full latest version you liked is included below) -->

  <!-- === NEW LOAD TRACKER PDF GENERATOR === -->
  <div class="card rounded-3xl shadow-md p-6 mt-12 border border-amber-200">
    <h2 class="uppercase text-xs font-bold text-amber-600 tracking-widest mb-4">Generate Load Tracker PDF</h2>
    
    <div class="grid grid-cols-2 gap-4 mb-6">
      <button onclick="selectForm('Semi')" id="btnSemi" class="form-select-btn active flex flex-col items-center py-4 border-2 border-emerald-600 rounded-2xl hover:bg-emerald-50">
        <i class="fas fa-truck text-3xl text-emerald-600 mb-2"></i>
        <span class="font-bold">Semi</span>
      </button>
      <button onclick="selectForm('T&T')" id="btnTandT" class="form-select-btn flex flex-col items-center py-4 border-2 border-gray-300 rounded-2xl hover:bg-gray-50">
        <i class="fas fa-truck-container text-3xl text-amber-600 mb-2"></i>
        <span class="font-bold">T&amp;T</span>
      </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">TRUCK #</label>
        <input id="truckNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">TRAILER #</label>
        <input id="trailerNum" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 mb-1">START MILEAGE</label>
        <input id="startMileage" type="text" class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-200">
      </div>
    </div>

    <button onclick="generateLoadTrackerPDF()" 
            class="w-full flex items-center justify-center gap-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl text-lg">
      <i class="fas fa-file-pdf"></i>
      Generate <span id="selectedFormName">Semi</span> PDF
    </button>
  </div>

</div>

<script>
// ============== YOUR CLEAN BREAK CALCULATOR LOGIC (latest version) ==============
/* (All your previous working code for clock in, breaks, tips, resetToNow, etc. is here - unchanged) */

// ============== PASTE YOUR TWO BASE64 STRINGS HERE ==============
const SEMI_PDF_BASE64 = "YOUR_FULL_SEMI_BASE64_STRING_HERE";   // ← Paste the entire SEMI base64
const TANDT_PDF_BASE64 = "YOUR_FULL_T_AND_T_BASE64_STRING_HERE"; // ← Paste the entire T&T base64

// ============== PDF-LIB TEMPLATE OVERLAY ==============
let selectedForm = "Semi";

function selectForm(form) {
  selectedForm = form;
  document.getElementById('selectedFormName').textContent = form;
  document.getElementById('btnSemi').classList.toggle('active', form === 'Semi');
  document.getElementById('btnTandT').classList.toggle('active', form === 'T&T');
}

async function generateLoadTrackerPDF() {
  const truck = document.getElementById('truckNum').value.trim() || "—";
  const trailer = document.getElementById('trailerNum').value.trim() || "—";
  const mileage = document.getElementById('startMileage').value.trim() || "—";

  const base64 = selectedForm === "Semi" ? SEMI_PDF_BASE64 : TANDT_PDF_BASE64;
  const pdfBytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  
  const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
  const pages = pdfDoc.getPages();
  const page = pages[0];
  const { width, height } = page.getSize();

  // === TEXT OVERLAY (example coordinates - test and adjust these) ===
  // Clock In Time + Date (top right area)
  page.drawText(currentClockTime, { x: 380, y: height - 95, size: 11 });
  page.drawText(currentDate, { x: 480, y: height - 95, size: 11 });

  // Truck / Trailer / Start Mileage (top header area)
  page.drawText(truck, { x: 180, y: height - 135, size: 12 });
  page.drawText(trailer, { x: 280, y: height - 135, size: 12 });
  page.drawText(mileage, { x: 420, y: height - 135, size: 12 });

  // Break times (in the BREAK section - adjust as needed)
  let y = height - 220;
  currentTenBreaks.forEach(b => {
    page.drawText(`${b.label} ${b.duration}`, { x: 80, y: y, size: 10 });
    page.drawText(b.after, { x: 220, y: y, size: 10 });
    page.drawText(b.before, { x: 320, y: y, size: 10 });
    y -= 18;
  });

  // Save and download
  const finalPdfBytes = await pdfDoc.save();
  const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Safety_Ninja_${selectedForm}_Load_Tracker.pdf`;
  a.click();
}

// Initialize
window.onload = () => {
  resetToNow();
  document.getElementById('btnSemi').classList.add('active');
};
</script>
</body>
</html>
